server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth Service
    location /api/auth {
        proxy_pass http://auth-service:4001;
        proxy_set_header Host $host;
    }

    # URL Service
    location /api/urls {
        proxy_pass http://url-service:4002;
        proxy_set_header Host $host;
    }

    # Redirect Service (handles short codes at the root)
    # This regex matches any 6-character alphanumeric code
    location ~ ^/([a-zA-Z0-9]{6})$ {
        proxy_pass http://redirect-service:4003/$1;
    }
}