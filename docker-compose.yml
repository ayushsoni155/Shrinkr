networks:
  url-shortener-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  zookeeper_data:
  kafka_data:

services:
  # ─── Gateway ───
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - url-service
      - redirect-service
    networks:
      - url-shortener-net

  # ─── Infrastructure ───
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    env_file: .env.prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file: .env.prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    env_file: .env.prod
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    env_file: .env.prod
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5

  # ─── Backends ───
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file: .env.prod
    # Improved migration logic using service_healthy dependency
    command: >
      sh -c "npx prisma db push && node src/index.js"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - url-shortener-net

  url-service:
    build: ./services/url-service
    container_name: url-service
    env_file: .env.prod
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url-shortener-net

  redirect-service:
    build: ./services/redirect-service
    container_name: redirect-service
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - url-shortener-net

  analytics-worker:
    build: ./services/analytics-worker
    container_name: analytics-worker
    env_file: .env.prod
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - url-shortener-net

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    env_file: .env.prod
    restart: unless-stopped
    networks:
      - url-shortener-net